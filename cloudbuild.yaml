steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/newsdeck-jrgzv/rss-aggregator:$SHORT_SHA', '.']

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/newsdeck-jrgzv/rss-aggregator:$SHORT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'rss-aggregator'
      - '--image'
      - 'gcr.io/newsdeck-jrgzv/rss-aggregator:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '60s'
      - '--min-instances'
      - '1'

options:
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET

images:
  - 'gcr.io/newsdeck-jrgzv/rss-aggregator:$SHORT_SHA'
